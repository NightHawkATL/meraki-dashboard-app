{% extends "app_layout.html" %}

{% block app_content %}
<script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
<link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />

<hgroup style="margin-bottom: 24px;">
    <h2 style="margin-bottom: 4px;">Script Execution</h2>
    <p style="color: #aaa; font-size: 0.9rem;">Select a script, organization, and network below.</p>
</hgroup>

<!-- 1. SMART SEARCH BAR -->
<div class="mui-paper" style="margin-bottom: 24px; padding: 16px 24px;">
    <label style="color: #1976d2; font-weight: 600; display: block; margin-bottom: 8px;">Smart Search</label>
    <input type="text" id="smartSearch" class="mui-input" style="width: 100%;" 
           placeholder="Search for Inncode, Hotel Name, or Network..." 
           list="network-datalist" oninput="handleSmartSearch(this.value)">
    
    <datalist id="network-datalist">
        {% for net in networks %}
        <option value="{{ net.network_name }}" data-org="{{ net.org_id }}" data-net="{{ net.network_id }}"></option>
        {% endfor %}
    </datalist>
</div>

<!-- 2. CASCADING SELECTION BOXES -->
<div style="display: grid; gap: 24px; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); margin-bottom: 24px;">
    <!-- Box 1: Script -->
    <div class="mui-paper" id="box-script" style="border-top: 4px solid #1976d2;">
        <label style="font-weight: 600; display: block; margin-bottom: 12px;">1. Select Script</label>
        <select id="scriptSelect" class="mui-input" style="width: 100%;" onchange="checkCascading()">
            <option value="" disabled selected>Available Scripts</option>
            {% for script in scripts %}
            <option value="{{ script.id }}">{{ script.name }}</option>
            {% endfor %}
        </select>
    </div>
    
    <!-- Box 2: Organization -->
    <div class="mui-paper" id="box-org" style="opacity: 0.5; transition: 0.3s;">
        <label style="font-weight: 600; display: block; margin-bottom: 12px;">2. Select Organization</label>
        <select id="orgSelect" class="mui-input" style="width: 100%;" disabled onchange="checkCascading(true)">
            <option value="" disabled selected>Organization</option>
            {% for org in orgs %}
            <option value="{{ org.id }}">{{ org.name }}</option>
            {% endfor %}
        </select>
    </div>
    
    <!-- Box 3: Network -->
    <div class="mui-paper" id="box-net" style="opacity: 0.5; transition: 0.3s;">
        <label style="font-weight: 600; display: block; margin-bottom: 12px;">3. Select Network</label>
        <select id="netSelect" class="mui-input" style="width: 100%;" disabled onchange="checkCascading()">
            <option value="" disabled selected>Target Network</option>
            {% for net in networks %}
            <option value="{{ net.network_id }}" class="net-opt org-{{ net.org_id }}" style="display: none;">
                {{ net.network_name }}
            </option>
            {% endfor %}
        </select>
    </div>
</div>

<!-- 3. EXECUTION VERIFICATION PANEL -->
<div id="verifyPanel" class="mui-paper" style="display: none; border: 1px solid #1976d2; margin-bottom: 24px;">
    <h5 style="color: #1976d2; margin-bottom: 8px;">Verification</h5>
    <p style="font-size: 0.95rem; margin-bottom: 16px;">
        You are about to run <strong id="verifyScript" style="color:#fff;"></strong> on <strong id="verifyNet" style="color:#fff;"></strong>.
    </p>
    <div style="display: flex; gap: 12px;">
        <button class="mui-btn" style="background: #4caf50; border: none; color: white;">Execute Script</button>
        <button class="mui-btn" style="background: transparent; border: 1px solid #f44336; color: #f44336;" onclick="resetForm()">Cancel / Reset</button>
    </div>
</div>

<!-- 4. SITE INFO & MAPBOX PLACEHOLDERS -->
<div class="mui-paper" style="display: flex; align-items: center; justify-content: center; min-height: 300px; background: #0a0a0a; padding: 0; overflow: hidden; position: relative;">
        <!-- The actual map will render inside this div -->
        <div id="map" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none;"></div>
        
        <!-- The placeholder if no map is loaded -->
        <div id="mapPlaceholder" style="text-align: center; color: #555; z-index: 10;">
            <span class="material-symbols-outlined" style="font-size: 48px; margin-bottom: 8px;">map</span>
            <h6 style="margin: 0; color: #888;">Mapbox Integration</h6>
            <small id="mapHelperText">Map will appear here when a network is selected.</small>
        </div>
    </div>

<script>
    const scriptSel = document.getElementById('scriptSelect');
    const orgSel = document.getElementById('orgSelect');
    const netSel = document.getElementById('netSelect');
    const boxScript = document.getElementById('box-script');
    const boxOrg = document.getElementById('box-org');
    const boxNet = document.getElementById('box-net');
    
    // Notice the "async" keyword here, allowing us to fetch API data!
    async function checkCascading(orgChanged = false) {
        if (scriptSel.value) {
            boxScript.style.borderTop = '4px solid #4caf50';
            orgSel.disabled = false; boxOrg.style.opacity = '1';
        } else {
            boxScript.style.borderTop = '4px solid #1976d2';
            orgSel.disabled = true; boxOrg.style.opacity = '0.5';
        }

        if (orgSel.value) {
            netSel.disabled = false; boxNet.style.opacity = '1';
            if (orgChanged) {
                netSel.value = ""; 
                document.querySelectorAll('.net-opt').forEach(opt => {
                    opt.style.display = opt.classList.contains('org-' + orgSel.value) ? 'block' : 'none';
                });
            }
        } else {
            netSel.disabled = true; boxNet.style.opacity = '0.5';
        }

        if (scriptSel.value && orgSel.value && netSel.value) {
            document.getElementById('verifyScript').textContent = scriptSel.options[scriptSel.selectedIndex].text;
            document.getElementById('verifyNet').textContent = netSel.options[netSel.selectedIndex].text;
            document.getElementById('verifyPanel').style.display = 'block';
            
            document.getElementById('siteInfoName').textContent = netSel.options[netSel.selectedIndex].text;
            
            const addressSpan = document.getElementById('siteAddress');
            addressSpan.textContent = "Fetching location from Meraki...";
            
            document.getElementById('siteInfoContent').style.display = 'block';
            document.getElementById('siteInfoPlaceholder').style.display = 'none';

            // Fetch Real Location Data from Backend!
            try {
                const response = await fetch(`/api/meraki/network/${netSel.value}/location`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    addressSpan.textContent = data.address;
                    
                    // --- MAPBOX MAGIC ---
                    const mapboxKey = "{{ mapbox_key }}";
                    if (!mapboxKey) {
                        document.getElementById('mapHelperText').textContent = "Mapbox API Key not configured in Settings.";
                    } else if (data.lat && data.lng) {
                        document.getElementById('mapPlaceholder').style.display = 'none';
                        document.getElementById('map').style.display = 'block';
                        
                        mapboxgl.accessToken = mapboxKey;
                        
                        // If map already exists, just move it. Otherwise, create it!
                        if (!window.networkMap) {
                            window.networkMap = new mapboxgl.Map({
                                container: 'map', // matches the div id
                                style: 'mapbox://styles/mapbox/dark-v11', // Sleek dark mode map!
                                center: [data.lng, data.lat], // Mapbox uses [Lng, Lat] format
                                zoom: 14
                            });
                            // Add a marker
                            window.networkMarker = new mapboxgl.Marker({ color: "#1976d2" })
                                .setLngLat([data.lng, data.lat])
                                .addTo(window.networkMap);
                        } else {
                            window.networkMap.setCenter([data.lng, data.lat]);
                            window.networkMarker.setLngLat([data.lng, data.lat]);
                        }
                    }
                } else {
                    addressSpan.textContent = "No address configured in Meraki dashboard.";
                    document.getElementById('mapPlaceholder').style.display = 'block';
                    document.getElementById('map').style.display = 'none';
                    document.getElementById('mapHelperText').textContent = "No coordinates found to display map.";
                }
            } catch (err) {
                addressSpan.textContent = "Failed to fetch location.";
            }

        } else {
            document.getElementById('verifyPanel').style.display = 'none';
            document.getElementById('siteInfoContent').style.display = 'none';
            document.getElementById('siteInfoPlaceholder').style.display = 'block';
        }
    }

    function handleSmartSearch(val) {
        const datalist = document.getElementById('network-datalist');
        for (let option of datalist.options) {
            if (option.value === val) {
                orgSel.value = option.getAttribute('data-org');
                checkCascading(true);
                netSel.value = option.getAttribute('data-net');
                checkCascading();
                break;
            }
        }
    }

    function resetForm() {
        scriptSel.value = ""; orgSel.value = ""; netSel.value = "";
        document.getElementById('smartSearch').value = "";
        checkCascading(true);
    }
</script>
{% endblock %}
