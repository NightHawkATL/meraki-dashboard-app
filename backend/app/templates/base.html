<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meraki Dashboard App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />

    <!-- UI SCALING & THEME SCRIPT -->
    <script>
        // Set the UI scale and theme immediately to prevent flickering.
        (function() {
            // Theme Initialization
            const savedTheme = localStorage.getItem('theme') || 'system';
            const actualTheme = savedTheme === 'system' 
                ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') 
                : savedTheme;
            document.documentElement.setAttribute('data-theme', actualTheme);

            // Scale Initialization (Default to 14px Standard 1080p scale)
            const savedScale = localStorage.getItem('uiScale') || '14px';
            document.documentElement.style.setProperty('font-size', savedScale, 'important');
        })();
    </script>

    <style>
        /* ========================================= */
        /* MUI Dark & Light Mode Variables           */
        /* ========================================= */
        :root[data-theme="dark"] {
            --pico-background-color: #121212;
            --sidebar-bg: #1e1e1e;
            --topbar-bg: #272727;
            --nav-width: 250px;
            --topbar-height: 64px;
            
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --text-muted: #bbbbbb;
            --border-color: #333333;
            --border-light: #444444;
            --input-bg: #121212;
            --hover-bg: rgba(255, 255, 255, 0.08);
            --list-hover: #1e1e1e;
            --list-border: #222222;
            
            --shadow-rich: rgba(0,0,0,0.5);
            --shadow-soft: rgba(0,0,0,0.5);
            --shadow-paper: rgba(0,0,0,0.2);
        }

        :root[data-theme="light"] {
            --pico-background-color: #f5f5f5;
            --sidebar-bg: #ffffff;
            --topbar-bg: #ffffff;
            --nav-width: 250px;
            --topbar-height: 64px;
            
            --text-primary: rgba(0, 0, 0, 0.87);
            --text-secondary: rgba(0, 0, 0, 0.6);
            --text-muted: rgba(0, 0, 0, 0.54);
            --border-color: #e0e0e0;
            --border-light: #cccccc;
            --input-bg: #ffffff;
            --hover-bg: rgba(0, 0, 0, 0.04);
            --list-hover: #f5f5f5;
            --list-border: #eeeeee;
            
            --shadow-rich: rgba(0,0,0,0.15);
            --shadow-soft: rgba(0,0,0,0.1);
            --shadow-paper: rgba(0,0,0,0.1);
        }

        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; color: var(--text-primary); }

        /* --- AUTH SCREEN STYLES (Material-UI Mimic) --- */
        .auth-wrapper { display: flex; justify-content: center; align-items: center; height: 100vh; padding: 1rem; }
        .auth-card { 
            background: var(--sidebar-bg); 
            padding: 32px; 
            border-radius: 8px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 8px 24px var(--shadow-rich); 
        }
        .auth-card h3 { margin-bottom: 8px; font-weight: 500; font-size: 2rem; text-align: center; color: var(--text-primary); }
        .auth-card p { text-align: center; font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 24px; }
        .auth-card label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; }
        .auth-card input { 
            margin-bottom: 16px; background: var(--input-bg); 
            border: 1px solid var(--border-light); border-radius: 4px; 
            padding: 0.75rem; color: var(--text-primary);
        }
        .auth-card input:focus { border-color: #1976d2; box-shadow: 0 0 0 1px #1976d2; outline: none; }
        .auth-card button { 
            margin-top: 8px; background-color: #1976d2; 
            border: none; border-radius: 4px; font-weight: bold; color: #fff;
        }
        .auth-card button:hover { background-color: #1565c0; }

        /* --- APP DASHBOARD STYLES --- */
        .app-topbar {
            position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-height);
            background: var(--topbar-bg); display: flex; align-items: center; justify-content: space-between;
            padding: 0 1.5rem; z-index: 1000; box-shadow: 0 2px 4px var(--shadow-soft);
        }
        .app-sidebar {
            position: fixed; top: var(--topbar-height); left: 0; bottom: 0; width: var(--nav-width);
            background: var(--sidebar-bg); border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .app-sidebar ul { list-style: none; padding: 0; margin: 0; padding-top: 1rem; }
        .app-sidebar a {
            display: flex; align-items: center; gap: 16px; padding: 12px 24px; 
            color: var(--text-primary); text-decoration: none; font-weight: 500; transition: background 0.2s;
        }
        .app-sidebar a:hover { background: var(--hover-bg); }
        .app-sidebar .logout-btn { color: #ff5252; margin-bottom: 1rem; cursor: pointer; }
        .app-sidebar .logout-btn:hover { background: rgba(255, 82, 82, 0.1); }
        
        .app-main {
            margin-top: var(--topbar-height); margin-left: var(--nav-width); padding: 2rem;
            height: calc(100vh - var(--topbar-height)); overflow-y: auto;
        }

        /* --- MUI COMPACT STYLES --- */
        .mui-paper {
            background: var(--sidebar-bg); border: 1px solid var(--border-color); 
            border-radius: 8px; padding: 24px; box-shadow: 0 4px 6px var(--shadow-paper);
        }
        .mui-input {
            margin-bottom: 0 !important; padding: 8px 12px !important; 
            font-size: 0.9rem !important; height: auto !important;
            background: var(--input-bg) !important; border: 1px solid var(--border-light) !important;
            color: var(--text-primary) !important;
        }
        .mui-btn {
            padding: 8px 24px !important; font-size: 0.85rem !important; 
            font-weight: 600 !important; text-transform: uppercase; 
            width: auto !important; height: 100% !important; margin: 0 !important;
            color: #fff;
        }
        
        /* --- TABS --- */
        .mui-tabs { display: flex; border-bottom: 1px solid var(--border-light); margin-bottom: 24px; gap: 8px; }
        .mui-tab {
            padding: 10px 20px; cursor: pointer; color: var(--text-secondary); text-transform: uppercase; 
            font-size: 0.8rem; font-weight: 600; border-bottom: 2px solid transparent; transition: 0.2s;
        }
        .mui-tab:hover { color: var(--text-primary); }
        .mui-tab.active { color: #1976d2; border-bottom: 2px solid #1976d2; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* --- DUAL PANE LISTS --- */
        .list-box { height: 350px; overflow-y: auto; border: 1px solid var(--border-light); border-radius: 4px; background: var(--input-bg); }
        .list-item { padding: 12px 16px; border-bottom: 1px solid var(--list-border); cursor: pointer; transition: 0.2s; color: var(--text-primary); }
        .list-item:hover { background: var(--list-hover); }
        .list-item.selected { background: rgba(25, 118, 210, 0.15); border-left: 3px solid #1976d2; }

        /* --- THEME TOGGLE BUTTONS --- */
        .theme-btn {
            background: transparent; border: none; cursor: pointer; padding: 4px 8px;
            color: var(--text-primary); display: flex; align-items: center; justify-content: center;
            transition: opacity 0.2s ease; border-radius: 4px;
        }
        .theme-btn:hover { background: var(--hover-bg); }
    </style>
</head>
<body>

    <!-- Pages inject their layout here -->
    {% block content %}{% endblock %}

    <!-- THEME LOGIC SCRIPT (Global Event Listeners) -->
    <script>
        function setTheme(theme) {
            localStorage.setItem('theme', theme);
            
            const actualTheme = theme === 'system' 
                ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') 
                : theme;
                
            document.documentElement.setAttribute('data-theme', actualTheme);
            
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.style.opacity = btn.id === `theme-${theme}` ? '1' : '0.4'; 
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            const savedTheme = localStorage.getItem('theme') || 'system';
            setTheme(savedTheme);
        });

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            if (localStorage.getItem('theme') === 'system') {
                document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
            }
        });
    </script>
</body>
</html>
