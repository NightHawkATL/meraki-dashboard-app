{% extends "base.html" %}

{% block content %}
<nav class="app-topbar">
    <div>
        <h4 style="margin: 0; color: #fff;">Meraki Dashboard App</h4>
    </div>
    <div style="display: flex; align-items: center; gap: 16px;">
        <span class="material-symbols-outlined" style="cursor: pointer; color: #aaa;">light_mode</span>
        <span class="material-symbols-outlined" style="cursor: pointer; color: #aaa;">dark_mode</span>
    </div>
</nav>

<!-- FIXED SIDEBAR -->
<aside class="app-sidebar">
    <ul>
        <li>
            <a href="/dashboard" onclick="localStorage.removeItem('activeSettingsTab');">
                <span class="material-symbols-outlined">play_arrow</span> Run Script
            </a>
        </li>
        <li>
            <a href="/history" onclick="localStorage.removeItem('activeSettingsTab');">
                <span class="material-symbols-outlined">history</span> Recent History
            </a>
        </li>
        <li>
            <a href="/settings" onclick="localStorage.removeItem('activeSettingsTab');">
                <span class="material-symbols-outlined">settings</span> Settings
            </a>
        </li>
    </ul>

    <ul>
        <li style="padding: 0 24px; color: #888; font-size: 0.8rem; margin-bottom: 8px;">
            User: {{ current_user.username.split('@')[0] }}
        </li>
        <li>
            <a class="logout-btn" hx-post="/api/auth/logout" onclick="localStorage.removeItem('activeSettingsTab');">
                <span class="material-symbols-outlined">logout</span> Log Out
            </a>
        </li>
    </ul>
</aside>

<!-- MAIN FLUID CONTENT AREA -->
<main class="app-main">
    <!-- Individual pages will inject their specific content here -->
    {% block app_content %}{% endblock %}
</main>
{% endblock %}
