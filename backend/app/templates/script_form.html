{% if script_id == 'port_bounce' %}
    <div style="display: flex; gap: 12px; margin-bottom: 24px; padding: 16px; background: rgba(0,0,0,0.2); border-radius: 4px; border: 1px dashed #333;">
        <div style="flex-grow: 1;">
            <label style="color: #aaa; font-size: 0.85rem; display: block; margin-bottom: 4px;">Select Target Switch</label>
            <select name="switch_serial" class="mui-input" style="width: 100%;" required>
                <option value="" disabled selected>-- Select a Switch --</option>
                {% for sw in switches %}
                    <option value="{{ sw.serial }}">{{ sw.name or sw.mac }} ({{ sw.model }})</option>
                {% else %}
                    <option value="" disabled>No switches found in this network.</option>
                {% endfor %}
            </select>
        </div>
        <div style="width: 100px;">
            <label style="color: #aaa; font-size: 0.85rem; display: block; margin-bottom: 4px;">Port #</label>
            <input type="number" name="port_number" class="mui-input" style="width: 100%; text-align: center;" placeholder="e.g. 4" required>
        </div>
    </div>

{% elif script_id == 'vlan_update' %}
    <div style="display: flex; gap: 12px; margin-bottom: 24px; padding: 16px; background: rgba(0,0,0,0.2); border-radius: 4px; border: 1px dashed #333;">
        <div style="width: 120px;">
            <label style="color: #aaa; font-size: 0.85rem; display: block; margin-bottom: 4px;">VLAN ID</label>
            <input type="number" name="vlan_id" class="mui-input" style="width: 100%;" placeholder="e.g. 100" required>
        </div>
        <div style="flex-grow: 1;">
            <label style="color: #aaa; font-size: 0.85rem; display: block; margin-bottom: 4px;">New Subnet</label>
            <input type="text" name="vlan_subnet" class="mui-input" style="width: 100%;" placeholder="192.168.100.0/24" required>
        </div>
    </div>

{% else %}
    <!-- No additional variables required for this script -->
{% endif %}
