{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
    <!-- Changed from <article> to <div> to remove Pico's huge margins -->
    <div class="auth-card">
        <header>
            <h3>{% if not admin_exists %}Meraki Admin{% else %}Admin Login{% endif %}</h3>
        </header>

        <div id="auth-alerts"></div>

        {% if not admin_exists %}
            <p>Create your master Admin account.</p>
            <form hx-post="/api/auth/setup" hx-target="#auth-alerts" hx-swap="innerHTML">
                <label>Admin Email
                    <input type="email" name="username" required>
                </label>
                <label>Secure Password
                    <input type="password" name="password" required>
                </label>
                <label>Confirm Password
                    <input type="password" name="confirm_password" required>
                </label>
                <button type="submit">Create Account</button>
            </form>
        {% else %}
            <form hx-post="/api/auth/login" hx-target="#auth-alerts" hx-swap="innerHTML">
                <label>Email Address
                    <input type="email" name="username" required>
                </label>
                <label>Password
                    <input type="password" name="password" required>
                </label>
                <button type="submit">Log In</button>
            </form>
        {% endif %}
    </div>
</div>
{% endblock %}
