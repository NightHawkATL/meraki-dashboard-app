services:
  # 1. PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: meraki_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword123}
      POSTGRES_DB: ${DB_NAME:-merakidb}
    volumes:
      - /mnt/Apps/Storage/meraki_app/postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  # 2. Redis (For Celery Task Queue)
  redis:
    image: redis:7-alpine
    container_name: meraki_redis
    restart: always
    networks:
      - app_network

  # 3. FastAPI Web Server (Now serving APIs AND HTML)
  backend:
    build: ./backend
    container_name: meraki_fastapi
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD:-securepassword123}@db:5432/${DB_NAME:-merakidb}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-supersecretjwtkey}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    ports:
      - "80:8000"  # Access the app directly via your server's IP address on port 80!
    volumes:
      - /mnt/Apps/Storage/meraki_app/script_storage:/app/storage
    depends_on:
      - db
      - redis
    networks:
      - app_network

  # 4. Celery Worker
  celery_worker:
    build: ./backend
    container_name: meraki_celery
    restart: always
    command: celery -A app.tasks worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD:-securepassword123}@db:5432/${DB_NAME:-merakidb}
      - REDIS_URL=redis://redis:6379/0
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - /mnt/Apps/Storage/meraki_app/script_storage:/app/storage
    depends_on:
      - db
      - redis
    networks:
      - app_network

networks:
  app_network:
    driver: bridge